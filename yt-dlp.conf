# yt-dlp configuration file
# This file automatically applies these settings every time you run yt-dlp in this folder.

# 1. Always force IPv4 to prevent YouTube connection timeouts
-4

# 2. Automatically default to merging video/audio into MP4 containers
--merge-output-format mp4

# 3. (Removed Android bypass to unlock 1080p HD formats)

# 4. Automatically sort downloads into separate format folders and include resolution in filename
-o "downloads/%(ext)s/%(title)s [%(id)s] [%(resolution)s].%(ext)s"

# 5. The Ultimate 403-Forbidden Fix: Force "Progressive" 720p MP4 streams instead of DASH streams. 
# DASH streams are broken into chunks, which YouTube blocks mid-download (403 error). Progressive streams download perfectly in one shot.
-f "b[ext=mp4][height<=720]/best"

# 6. If converting to audio-only (like MP3), force the highest possible bitrate (320kbps equivalent)
--audio-quality 0
